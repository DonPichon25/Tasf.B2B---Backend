# ===================================================================
# CONFIGURACIÓN H2 - BASE DE DATOS EN MEMORIA (TESTING)
# ===================================================================
# Para usar este perfil: mvn spring-boot:run -Dspring-boot.run.profiles=h2
# O en IDE: Run Configuration -> VM Options: -Dspring.profiles.active=h2

# Application
spring.application.name=MoraPack
server.port=8080

# ===================================================================
# H2 DATABASE (EN MEMORIA)
# ===================================================================
spring.datasource.url=jdbc:h2:mem:morapackdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ===================================================================
# H2 CONSOLE (para ver la BD en el navegador)
# ===================================================================
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
# Acceder en: http://localhost:8080/h2-console
# JDBC URL: jdbc:h2:mem:morapackdb
# User: sa
# Password: (dejar vacío)

# ===================================================================
# JPA / HIBERNATE CONFIGURATION
# ===================================================================
spring.jpa.hibernate.ddl-auto=create-drop
# ⚠️ create-drop = Se borra TODO al cerrar la aplicación
# create = Se borra y recrea cada vez que inicias
# update = Mantiene datos entre reinicios (pero H2 en memoria los pierde igual)

# NOTA: show-sql=true imprime SQLs en consola (útil para debug, lento para importación)
# Para importación masiva, cambiar ambos a false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.defer-datasource-initialization=true

# ===================================================================
# JWT CONFIGURATION
# ===================================================================
jwt.secret=ColocaUnSecretoLargoDeAlMenos32Caracteres_2025_MoraPack
jwt.expiration.ms=86400000

# ===================================================================
# SWAGGER / OPENAPI CONFIGURATION
# ===================================================================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

# ===================================================================
# LOGGING CONFIGURATION
# ===================================================================
logging.level.root=INFO
# Cambiar a DEBUG solo si necesitas debug específico
logging.level.com.grupo5e.morapack=INFO
logging.level.org.springframework.web=INFO
# DESACTIVADO: Solo activar cuando necesites debug de SQL (impacta rendimiento)
logging.level.org.hibernate.SQL=OFF

# ===================================================================
# ALNS TEST CONFIGURATION
# ===================================================================
alns.test.enabled=false

# ===================================================================
# PERFORMANCE OPTIMIZATION (HikariCP Connection Pool)
# ===================================================================
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.pool-name=MoraPackH2Pool

# ===================================================================
# JPA BATCH PROCESSING (PERFORMANCE)
# ===================================================================
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.batch_versioned_data=true

# ===================================================================
# CACHE CONFIGURATION
# ===================================================================
morapack.cache.enabled=true

# ===================================================================
# FILE UPLOAD CONFIGURATION
# ===================================================================
# Tamaño máximo de archivo (para archivos grandes de pedidos)
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB

