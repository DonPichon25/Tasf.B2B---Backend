# ===================================================================
# MORAPACK APPLICATION CONFIGURATION
# ===================================================================

# Application
spring.application.name=MoraPack
server.port=8080

# ===================================================================
# DATABASE CONFIGURATION - PostgreSQL
# ===================================================================
spring.datasource.url=jdbc:postgresql://morapack.cefow9gigpev.us-east-1.rds.amazonaws.com:5432/postgres
spring.datasource.username=adminMorapack
spring.datasource.password=morapackFASILYOJE
spring.datasource.driver-class-name=org.postgresql.Driver

# ===================================================================
# JPA / HIBERNATE CONFIGURATION
# ===================================================================
spring.jpa.hibernate.ddl-auto=update
# DESACTIVADO para máximo rendimiento en importación masiva
# cambiar ambos  a true de ser necesario debuguear.
spring.jpa.show-sql=false   
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# Optimizaciones adicionales para INSERT masivo
spring.jpa.properties.hibernate.jdbc.fetch_size=500
spring.jpa.properties.hibernate.connection.provider_disables_autocommit=true

# ===================================================================
# JWT CONFIGURATION
# ===================================================================
# IMPORTANTE: Cambiar el secret en producci\u00f3n (m\u00ednimo 32 caracteres)
jwt.secret=ColocaUnSecretoLargoDeAlMenos32Caracteres_2025_MoraPack
# Expiraci\u00f3n del token en milisegundos (86400000 = 24 horas)
jwt.expiration.ms=86400000

# ===================================================================
# SWAGGER / OPENAPI CONFIGURATION
# ===================================================================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.tryItOutEnabled=true

# ===================================================================
# LOGGING CONFIGURATION
# ===================================================================
logging.level.root=INFO
# Cambiar a INFO en producción/importación para mejor rendimiento
logging.level.com.grupo5e.morapack=INFO
logging.level.org.springframework.web=INFO
# DESACTIVADO: Solo activar cuando necesites debug de SQL
logging.level.org.hibernate.SQL=OFF
# logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE  # Descomentar para ver parámetros

# ===================================================================
# ALNS TEST CONFIGURATION
# ===================================================================
# Ejecutar test del ALNS al iniciar la aplicación (true/false)
# Por defecto: false (deshabilitado)
alns.test.enabled=false

# ===================================================================
# PERFORMANCE OPTIMIZATION (HikariCP Connection Pool)
# ===================================================================
# Aumentado para importación masiva concurrente
spring.datasource.hikari.maximum-pool-size=30
spring.datasource.hikari.minimum-idle=10
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
# Leak detection solo en desarrollo (overhead en producción)
spring.datasource.hikari.leak-detection-threshold=0
spring.datasource.hikari.pool-name=MoraPackHikariPool

# Optimizaciones adicionales para AWS RDS
spring.datasource.hikari.connection-test-query=SELECT 1
spring.datasource.hikari.validation-timeout=5000
spring.datasource.hikari.keepalive-time=300000
spring.datasource.hikari.auto-commit=false

# ===================================================================
# JPA BATCH PROCESSING (PERFORMANCE)
# ===================================================================
# CRÍTICO: Aumentado para importación masiva de pedidos (100K+ registros)
spring.jpa.properties.hibernate.jdbc.batch_size=1000
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

spring.jpa.properties.hibernate.jdbc.batch_versioned_data=true

# Desactivar features que no necesitas durante importación masiva
spring.jpa.properties.hibernate.generate_statistics=false
spring.jpa.properties.hibernate.cache.use_second_level_cache=false
spring.jpa.properties.hibernate.cache.use_query_cache=false

# Optimizar para INSERT masivo
spring.jpa.properties.hibernate.order_by.default_null_ordering=last
spring.jpa.properties.hibernate.query.in_clause_parameter_padding=true

# ===================================================================
# ASYNC THREAD POOL CONFIGURATION
# ===================================================================
spring.task.execution.pool.core-size=4
spring.task.execution.pool.max-size=16
spring.task.execution.pool.queue-capacity=100
spring.task.execution.thread-name-prefix=morapack-async-

# ===================================================================
# CACHE CONFIGURATION
# ===================================================================
morapack.cache.enabled=true

# ===================================================================
# FILE UPLOAD CONFIGURATION
# ===================================================================
# Tamaño máximo de archivo (para archivos grandes de pedidos)
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB

# ===================================================================
# ALGORITHM EXECUTION TIMEOUT CONFIGURATION
# ===================================================================
# Timeout para algoritmo diario (en segundos) - 5 minutos
morapack.algorithm.daily.timeout=300
# Timeout para algoritmo semanal (en segundos) - 2 horas
morapack.algorithm.weekly.timeout=7200
# Timeout para algoritmo general (en segundos) - 30 minutos
morapack.algorithm.default.timeout=1800

# ===================================================================
# TOMCAT PERFORMANCE TUNING
# ===================================================================
server.tomcat.threads.max=200
server.tomcat.threads.min-spare=10
server.tomcat.max-connections=10000
server.tomcat.accept-count=100
server.tomcat.connection-timeout=20000

# ===================================================================
# JACKSON PERFORMANCE
# ===================================================================
spring.jackson.serialization.fail-on-empty-beans=false
spring.jackson.default-property-inclusion=non_null