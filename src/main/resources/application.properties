# ===================================================================
# MORAPACK APPLICATION CONFIGURATION
# ===================================================================

# Application
spring.application.name=MoraPack
server.port=8080

# ===================================================================
# DATABASE CONFIGURATION - PostgreSQL
# ===================================================================
spring.datasource.url=jdbc:postgresql://morapack.cefow9gigpev.us-east-1.rds.amazonaws.com:5432/postgres
spring.datasource.username=adminMorapack
spring.datasource.password=morapackFASILYOJE
spring.datasource.driver-class-name=org.postgresql.Driver

# ===================================================================
# JPA / HIBERNATE CONFIGURATION
# ===================================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# ===================================================================
# JWT CONFIGURATION
# ===================================================================
# IMPORTANTE: Cambiar el secret en producci\u00f3n (m\u00ednimo 32 caracteres)
jwt.secret=ColocaUnSecretoLargoDeAlMenos32Caracteres_2025_MoraPack
# Expiraci\u00f3n del token en milisegundos (86400000 = 24 horas)
jwt.expiration.ms=86400000

# ===================================================================
# SWAGGER / OPENAPI CONFIGURATION
# ===================================================================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.tryItOutEnabled=true

# ===================================================================
# LOGGING CONFIGURATION
# ===================================================================
logging.level.root=INFO
logging.level.com.grupo5e.morapack=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG

# ===================================================================
# ALNS TEST CONFIGURATION
# ===================================================================
# Ejecutar test del ALNS al iniciar la aplicación (true/false)
# Por defecto: false (deshabilitado)
alns.test.enabled=false

# ===================================================================
# PERFORMANCE OPTIMIZATION (HikariCP Connection Pool)
# ===================================================================
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.leak-detection-threshold=60000
spring.datasource.hikari.pool-name=MoraPackHikariPool

# ===================================================================
# JPA BATCH PROCESSING (PERFORMANCE)
# ===================================================================
# Aumentado de 50 a 500 para importación masiva de vuelos (~2866 registros)
spring.jpa.properties.hibernate.jdbc.batch_size=500
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.batch_versioned_data=true
# Desactivar estadísticas durante carga masiva
spring.jpa.properties.hibernate.generate_statistics=false

# ===================================================================
# ASYNC THREAD POOL CONFIGURATION
# ===================================================================
spring.task.execution.pool.core-size=4
spring.task.execution.pool.max-size=16
spring.task.execution.pool.queue-capacity=100
spring.task.execution.thread-name-prefix=morapack-async-

# ===================================================================
# CACHE CONFIGURATION
# ===================================================================
morapack.cache.enabled=true

# ===================================================================
# FILE UPLOAD CONFIGURATION
# ===================================================================
# Tamaño máximo de archivo (para archivos grandes de pedidos)
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB