# ===================================================================
# PERFORMANCE OPTIMIZATION CONFIGURATION
# ===================================================================

# ===================================================================
# HIKARICP CONNECTION POOL (CRÍTICO PARA PERFORMANCE)
# ===================================================================
# Maximum pool size: Ajustar según carga esperada
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5

# Connection timeout: 30 segundos
spring.datasource.hikari.connection-timeout=30000

# Idle timeout: 10 minutos (600000ms)
spring.datasource.hikari.idle-timeout=600000

# Max lifetime: 30 minutos (1800000ms)
spring.datasource.hikari.max-lifetime=1800000

# Connection leak detection: 60 segundos
spring.datasource.hikari.leak-detection-threshold=60000

# Pool name para debugging
spring.datasource.hikari.pool-name=MoraPackHikariPool

# ===================================================================
# JPA/HIBERNATE PERFORMANCE OPTIMIZATION
# ===================================================================
# Batch processing
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.batch_versioned_data=true

# Query optimization
spring.jpa.properties.hibernate.query.in_clause_parameter_padding=true
spring.jpa.properties.hibernate.query.fail_on_pagination_over_collection_fetch=true

# Second-level cache (si se necesita)
# spring.jpa.properties.hibernate.cache.use_second_level_cache=true
# spring.jpa.properties.hibernate.cache.region.factory_class=org.hibernate.cache.jcache.JCacheRegionFactory

# Statistics (desactivar en producción)
spring.jpa.properties.hibernate.generate_statistics=false

# ===================================================================
# ALGORITHM EXECUTION TIMEOUT CONFIGURATION
# ===================================================================
# Timeout para algoritmo diario (en segundos) - 5 minutos
morapack.algorithm.daily.timeout=300

# Timeout para algoritmo semanal (en segundos) - 2 horas
morapack.algorithm.weekly.timeout=7200

# Timeout para algoritmo general (en segundos) - 30 minutos
morapack.algorithm.default.timeout=1800

# ===================================================================
# SPRING ASYNC CONFIGURATION
# ===================================================================
# Thread pool para operaciones asíncronas
spring.task.execution.pool.core-size=4
spring.task.execution.pool.max-size=16
spring.task.execution.pool.queue-capacity=100
spring.task.execution.thread-name-prefix=morapack-async-

# ===================================================================
# JACKSON PERFORMANCE
# ===================================================================
# Lazy initialization for better startup
spring.jackson.serialization.fail-on-empty-beans=false
spring.jackson.default-property-inclusion=non_null

# ===================================================================
# TOMCAT PERFORMANCE TUNING
# ===================================================================
server.tomcat.threads.max=200
server.tomcat.threads.min-spare=10
server.tomcat.max-connections=10000
server.tomcat.accept-count=100
server.tomcat.connection-timeout=20000

# ===================================================================
# LOGGING FOR PERFORMANCE (Desactivar SQL en producción)
# ===================================================================
# logging.level.org.hibernate.SQL=WARN
# logging.level.org.hibernate.type.descriptor.sql.BasicBinder=WARN

